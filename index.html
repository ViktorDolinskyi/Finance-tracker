<style>
  @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap');
  :root{
    --bg:#F4F3EE;--surface:#FFFFFF;--surface2:#F4F2EB;--ink:#1A1C19;--muted:#6E7268;--line:#E7E4DA;--line-soft:#F0EEE7;

  }

  *{box-sizing:border-box;margin:0;padding:0}

  :root{color-scheme:light}

function paintIcons(scope){(scope||document).querySelectorAll('[data-icon]').forEach(el=>{

const accMap=()=>Object.fromEntries(D.accounts.map(a=>[a.id,a]));

const toUAH=(n,c)=>c==='USD'?n*usdRate():c==='EUR'?n*eurRate():n;
function balanceOf(id){const a=accMap()[id];if(!a)return 0;let b=Number(a.initial)||0;for(const t of D.txs){const am=Number(t.amount);if(t.type==='income'&&t.account_id===id)b+=am;else if(t.type==='expense'&&t.account_id===id)b-=am;else if(t.type==='transfer'){if(t.account_id===id)b-=am;if(t.to_account_id===id)b+=(t.to_amount!=null?Number(t.to_amount):am);}}return b;}
const netWorthUAH=()=>D.accounts.filter(a=>a.in_networth!==false&&!a.archived).reduce((s,a)=>s+toUAH(balanceOf(a.id),a.currency),0);
function balanceAt(id,endISO){const a=accMap()[id];if(!a)return 0;let b=Number(a.initial)||0;for(const t of D.txs){if(t.occurred_at>endISO)continue;const am=Number(t.amount);if(t.type==='income'&&t.account_id===id)b+=am;else if(t.type==='expense'&&t.account_id===id)b-=am;else if(t.type==='transfer'){if(t.account_id===id)b-=am;if(t.to_account_id===id)b+=(t.to_amount!=null?Number(t.to_amount):am);}}return b;}

async function init(){
  const cfg=getCfg();
  if(!cfg||!cfg.url||!cfg.key)return renderCfg();
  sb=createClient(cfg.url,cfg.key);
  const {data:{session}}=await sb.auth.getSession();
  sb.auth.onAuthStateChange((_e,s)=>{user=s?.user||null;user?afterLogin():renderAuth();});
  user=session?.user||null;
  user?afterLogin():renderAuth();
}
async function afterLogin(){
  try{const c=JSON.parse(localStorage.getItem('cache')||'null');if(c){D=c;renderApp();}}catch{}
  await loadData();
  try{if(localStorage.getItem('ratesDate')!==todayDate())refreshRates(true);}catch(e){}
}
async function loadData(){
  const r=await Promise.all([
    sb.from('accounts').select('*').order('sort'),
    sb.from('categories').select('*').order('sort'),
    sb.from('transactions').select('*').order('occurred_at',{ascending:false}),
    sb.from('settings').select('*').limit(1),
    sb.from('tags').select('*').order('sort'),
    sb.from('planned').select('*').order('next_date'),
    sb.from('templates').select('*').order('sort'),
  ]);
  const err=r.find(x=>x.error);
  if(err)return renderDbError(err.error.message);
  let [acc,cat,tx,st,tg,pl,tpl]=r.map(x=>x.data||[]);
  if(acc.length===0 && cat.length===0 && !seededOnce){ seededOnce=true; await seed(); return loadData(); }
  let settings=st[0];
  if(!settings){ await sb.from('settings').insert({}); settings={usd_rate:41,eur_rate:45}; }
  D={accounts:acc,categories:cat,txs:tx,settings,tags:tg,planned:pl,templates:tpl};
  try{localStorage.setItem('cache',JSON.stringify(D));}catch{}
  renderApp();
}
async function seed(){
  const accRows=DEF_ACCOUNTS.map((a,i)=>({name:a.name,icon:a.icon,initial:a.initial,type:a.type,currency:a.currency,credit_limit:a.credit_limit||0,sort:i}));
  const catRows=[...DEF_EXPENSE.map((c,i)=>({kind:'expense',name:c.name,icon:c.icon,lucide:c.lucide,color:c.color,sort:i})),
                 ...DEF_INCOME.map((c,i)=>({kind:'income',name:c.name,icon:c.icon,lucide:c.lucide,color:c.color,sort:i}))];
  await sb.from('accounts').insert(accRows);
  await sb.from('categories').insert(catRows);
}

async function saveTx(){
  const amount=num(sheet.amount);
  if(!amount||amount<=0)return;
  if(sheet.type!=='transfer' && !sheet.categoryId)return;
  if(sheet.type==='transfer' && sheet.accountId===sheet.toAccountId)return;
  let to_amount=null;
  if(sheet.type==='transfer'){const fc=accCur(sheet.accountId),tc=accCur(sheet.toAccountId);to_amount=(fc!==tc)?(num(sheet.toAmount)||amount):amount;}
  const row={type:sheet.type,amount:Math.round(amount*100)/100,account_id:sheet.accountId,
    to_account_id:sheet.type==='transfer'?sheet.toAccountId:null,
    to_amount:to_amount!=null?Math.round(to_amount*100)/100:null,
    category_id:sheet.type==='transfer'?null:sheet.categoryId,
    occurred_at:inputToISO(sheet.date),note:(sheet.note||'').trim(),tags:sheet.tags||[]};
  let res=sheet.id?await sb.from('transactions').update(row).eq('id',sheet.id):await sb.from('transactions').insert(row);
  if(res.error){alert('Помилка: '+res.error.message);return;}
  if(sheet.type!=='transfer')month=monthKey(new Date(sheet.date));
  closeSheet(); await loadData();
}
async function delTx(id){const{error}=await sb.from('transactions').delete().eq('id',id);if(error){alert(error.message);return;}closeSheet();await loadData();}
async function savePlan(){
  const amount=num(sheet.amount);if(!amount||amount<=0)return;
  if(sheet.type!=='transfer'&&!sheet.categoryId)return;
  if(sheet.type==='transfer'&&sheet.accountId===sheet.toAccountId)return;
  let to_amount=null;if(sheet.type==='transfer'){const fc=accCur(sheet.accountId),tc=accCur(sheet.toAccountId);to_amount=(fc!==tc)?(num(sheet.toAmount)||amount):amount;}
  const row={type:sheet.type,amount:Math.round(amount*100)/100,account_id:sheet.accountId,to_account_id:sheet.type==='transfer'?sheet.toAccountId:null,to_amount:to_amount!=null?Math.round(to_amount*100)/100:null,category_id:sheet.type==='transfer'?null:sheet.categoryId,note:(sheet.note||'').trim(),tags:sheet.tags||[],next_date:sheet.nextDate,repeat:sheet.repeat||'none',active:true};
  let res=sheet.planId?await sb.from('planned').update(row).eq('id',sheet.planId):await sb.from('planned').insert(row);
  if(res.error){alert(res.error.message);return;}
  closeSheet();await loadData();
}
async function delPlan(id){const{error}=await sb.from('planned').delete().eq('id',id);if(error){alert(error.message);return;}closeSheet();await loadData();}
async function postPlan(p){
  const occ=new Date(p.next_date+'T12:00:00').toISOString();
  const ins=await sb.from('transactions').insert({type:p.type,amount:p.amount,account_id:p.account_id,to_account_id:p.to_account_id,to_amount:p.to_amount,category_id:p.category_id,occurred_at:occ,note:p.note||'',tags:p.tags||[]});
  if(ins.error){alert(ins.error.message);return;}
  if(p.repeat&&p.repeat!=='none')await sb.from('planned').update({next_date:advanceDate(p.next_date,p.repeat)}).eq('id',p.id);
  else await sb.from('planned').delete().eq('id',p.id);
  await loadData();
}

async function saveSetting(patch){const{error}=await sb.from('settings').upsert({user_id:user.id,...patch},{onConflict:'user_id'});if(error){alert(error.message);return;}D.settings={...D.settings,...patch};renderApp();}
async function refreshRates(silent){
  const rb=document.getElementById('ratesBtn');if(rb&&!silent){rb.disabled=true;rb.textContent='Оновлюю…';}
  try{
    const res=await fetch('https://bank.gov.ua/NBUStatService/v1/statdirectory/exchange?json');
    if(!res.ok)throw new Error('http');
    const arr=await res.json();
    const usd=arr.find(x=>x.cc==='USD'),eur=arr.find(x=>x.cc==='EUR');
    if(!usd||!eur)throw new Error('no data');
    try{localStorage.setItem('ratesDate',todayDate());localStorage.setItem('ratesAt',new Date().toISOString());}catch(e){}
    await saveSetting({usd_rate:Math.round(usd.rate*100)/100,eur_rate:Math.round(eur.rate*100)/100});
    if(!silent)alert('Курс НБУ оновлено:\n$ '+usd.rate.toFixed(2)+' ₴\n€ '+eur.rate.toFixed(2)+' ₴');
  }catch(e){
    if(!silent){alert('Не вдалося отримати курс НБУ. Перевір зʼєднання або введи вручну.');renderApp();}
  }
}

function monthTxs(){return D.txs.filter(t=>monthKey(new Date(t.occurred_at))===month).sort((a,b)=>new Date(b.occurred_at)-new Date(a.occurred_at));}
function shiftMonth(d){const[y,m]=month.split('-').map(Number);month=monthKey(new Date(y,m-1+d,1));dayFilter=null;renderApp();}
function monthTitle(){const[y,m]=month.split('-').map(Number);return `${MONN[m-1]} ${y}`;}
function donutSVG(segs,centerV){const r=64,cx=90,cy=90,circ=2*Math.PI*r;let off=0;const sum=segs.reduce((s,x)=>s+x.value,0);
  const arcs=sum===0?`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--line)" stroke-width="20"/>`
    :segs.map(s=>{const len=s.value/sum*circ;const o=-off;off+=len;return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="20" stroke-dasharray="${len} ${circ-len}" stroke-dashoffset="${o}" transform="rotate(-90 ${cx} ${cy})"/>`;}).join('');
  return `<div class="donut-wrap"><svg viewBox="0 0 180 180" width="180" height="180">${arcs}</svg><div class="donut-center"><div class="l">Витрати</div><div class="v">${centerV}</div></div></div>`;}

  bindView(); paintIcons();
}

function viewHome(){
  const mt=monthTxs();
  const inc=mt.filter(t=>t.type==='income').reduce((s,t)=>s+toUAH(Number(t.amount),accCur(t.account_id)),0);
  const exp=mt.filter(t=>t.type==='expense').reduce((s,t)=>s+toUAH(Number(t.amount),accCur(t.account_id)),0);
  const usd=holdings('USD'), eur=holdings('EUR');
  const fhold=[]; if(usd)fhold.push(fmt(usd,'USD')); if(eur)fhold.push(fmt(eur,'EUR'));
  const dacc=D.accounts.filter(a=>a.type==='debt'&&!a.archived);
  const owedToMe=dacc.reduce((s,a)=>{const b=balanceOf(a.id);return s+(b>0?toUAH(b,a.currency):0);},0);
  const iOwe=dacc.reduce((s,a)=>{const b=balanceOf(a.id);return s+(b<0?toUAH(-b,a.currency):0);},0);
  const groups=AGROUPS.map(([ty,lbl])=>{const list=D.accounts.filter(a=>agroup(a.type)===ty&&!a.archived);if(!list.length)return '';
    const head=ty==='debt'?`<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px"><h2 style="margin:0">${lbl}</h2><div class="mono" style="font-size:11px;color:var(--muted)">+${fmt0(owedToMe)} / −${fmt0(iOwe)}</div></div>`:`<h2>${lbl}</h2>`;
    return `<div class="card">${head}${list.map(a=>{const b=balanceOf(a.id);let sub,cls;
      if(ty==='debt'){const dir=b>0?'мені винні':b<0?'я винен':'закрито';const over=a.due_date&&String(a.due_date)<=todayDate()&&b!==0;const due=a.due_date?` · до ${fmtDate(a.due_date)}`:'';const intr=a.interest_rate?` · ~${fmt0(Math.abs(b)*Number(a.interest_rate)/100,a.currency)}/рік`:'';sub=`${dir}<span style="${over?'color:var(--expense)':''}">${due}${over?' · прострочено':''}</span>${intr}`;cls=b<0?'neg':b>0?'pos':'';}
      else{if(a.type==='credit'){const lim=Number(a.credit_limit)||0;const used=b<0?-b:0;const avail=lim+b;let ex='';if(a.due_day){const t=new Date();let dm=new Date(t.getFullYear(),t.getMonth(),a.due_day);if(dm<new Date(t.getFullYear(),t.getMonth(),t.getDate()))dm=new Date(t.getFullYear(),t.getMonth()+1,a.due_day);ex+=` · платіж до ${pad(dm.getDate())}.${pad(dm.getMonth()+1)}`;}if(a.min_payment&&used>0)ex+=` · мін ${fmt0(used*Number(a.min_payment)/100,a.currency)}`;if(a.interest_rate)ex+=` · ${Number(a.interest_rate)}%`;sub=`доступно ${fmt0(avail,a.currency)} з ${fmt0(lim,a.currency)}${ex}`;}else sub=ATYPE_L[a.type]||'Рахунок';cls=b<0?'neg':'';}
      return `<div class="row-item" data-acct="${a.id}" style="cursor:pointer">${accTile(a)}<div class="nm"><div class="t">${esc(a.name)}</div><div class="s">${sub}</div></div><div class="amt ${cls}">${fmt(b,a.currency)}</div></div>`;}).join('')}</div>`;}).join('');
  const cm0=catMap();
  const tplCard=D.templates.length?`<div class="card"><h2>Шаблони</h2><div class="chips">${D.templates.map(t=>{const c=cm0[t.category_id];const col=t.type==='income'?'var(--income)':t.type==='transfer'?'var(--transfer)':(c&&c.color||'var(--expense)');return `<button class="chip" data-tpl="${t.id}"><span class="dot" style="background:${col}"></span>${esc(t.name)}</button>`;}).join('')}</div></div>`:'';
  return `
  <div class="hdr"><div><h1>Огляд</h1><div class="sub">${user?esc(user.email):''}</div></div>
    <div class="hdr-actions"><button class="iconbtn" id="themeBtn"><span data-icon="${curTheme()==='dark'?'Sun':'Moon'}"></span></button></div></div>
  <div class="hero"><div class="lbl">Чистий капітал</div><div class="bal">${fmt0(netWorthUAH())}</div>
    ${fhold.length?`<div class="usd">у т.ч. ${fhold.join(' · ')} · курс ${fmt0(usdRate())}/$ · ${fmt0(eurRate())}/€</div>`:''}
    <div class="row">
      <div class="pill"><div class="t"><span data-icon="ArrowDownLeft"></span>Дохід / міс</div><div class="v pos">${fmt0(inc)}</div></div>
      <div class="pill"><div class="t"><span data-icon="ArrowUpRight"></span>Витрати / міс</div><div class="v neg">${fmt0(exp)}</div></div>
    </div></div>
  ${tplCard}

function viewOps(){
  const am=accMap(),cm=catMap(),tm=tagMap();
  const hdr=`<div class="hdr"><h1>Операції</h1><div class="hdr-actions"><button class="iconbtn" id="themeBtn"><span data-icon="${curTheme()==='dark'?'Sun':'Moon'}"></span></button></div></div>`;
  const nav=`<div class="monthnav"><button data-m="-1"><span data-icon="ChevronLeft"></span></button><div class="lbl">${monthTitle()}</div><button data-m="1"><span data-icon="ChevronRight"></span></button></div>`;
  const toggle=`<div class="vtoggle"><button class="${opsMode==='list'?'on':''}" data-opsmode="list">Список</button><button class="${opsMode==='calendar'?'on':''}" data-opsmode="calendar">Календар</button></div>`;
  const rowHtml=(t)=>{const a=Number(t.amount);
    if(t.type==='transfer'){const f=am[t.account_id],to=am[t.to_account_id];return `<div class="row-item" data-tx="${t.id}"><span class="ic" style="--c:var(--transfer)" data-icon="ArrowLeftRight"></span><div class="nm"><div class="t">Переказ</div><div class="s">${esc(f?f.name:'?')} → ${esc(to?to.name:'?')}</div></div><div class="amt tr">${fmt(a,f?f.currency:'UAH')}</div></div>`;}
    const c=cm[t.category_id]||{icon:'•',color:'#8A8F9E'};const acc=am[t.account_id];const sign=t.type==='income'?'pos':'neg';const pfx=t.type==='income'?'+':'−';const tn=(t.tags||[]).map(id=>tm[id]?.name).filter(Boolean);
    const cmk=t.created_at&&dayOf(t.created_at)!==dayOf(t.occurred_at)?` · ств. ${pad(new Date(t.created_at).getDate())}.${pad(new Date(t.created_at).getMonth()+1)}`:'';
    return `<div class="row-item" data-tx="${t.id}">${tile(c)}<div class="nm"><div class="t">${esc(c.name||'—')}</div><div class="s">${esc(acc?acc.name:'')}${t.note?' · '+esc(t.note):''}${tn.length?' · '+tn.map(n=>'#'+esc(n)).join(' '):''}${cmk}</div></div><div class="amt ${sign}">${pfx}${fmt(a,accCur(t.account_id))}</div></div>`;};

  if(opsMode==='calendar'){
    const kf=n=>n>=1000?(n/1000).toFixed(n>=10000?0:1)+'k':String(Math.round(n));
    const [yy,mm]=month.split('-').map(Number);
    const offset=(new Date(yy,mm-1,1).getDay()+6)%7;const dim=new Date(yy,mm,0).getDate();const today=todayDate();
    const agg={};monthTxs().forEach(t=>{const d=new Date(t.occurred_at).getDate();const u=toUAH(Number(t.amount),accCur(t.account_id));if(!agg[d])agg[d]={e:0,i:0};if(t.type==='expense')agg[d].e+=u;else if(t.type==='income')agg[d].i+=u;});
    const wd=['Пн','Вт','Ср','Чт','Пт','Сб','Нд'].map(w=>`<div class="wd">${w}</div>`).join('');
    let cells='';for(let i=0;i<offset;i++)cells+=`<div class="cell blank"></div>`;
    for(let d=1;d<=dim;d++){const ds=`${yy}-${pad(mm)}-${pad(d)}`;const g=agg[d];const sel=dayFilter===ds;
      cells+=`<div class="cell ${sel?'sel':''} ${ds===today&&!sel?'today':''}" data-day="${ds}"><span class="d">${d}</span>${g&&g.e?`<span class="e">−${kf(g.e)}</span>`:''}${g&&g.i?`<span class="i">+${kf(g.i)}</span>`:''}</div>`;}
    const dayTx=dayFilter?monthTxs().filter(t=>dayKey(new Date(t.occurred_at))===dayFilter):[];
    const dayBlock=dayFilter?`<div class="daylbl"><span>${fmtDate(dayFilter)}</span><button class="chip" data-day="" style="padding:4px 10px">← усі дні</button></div>${dayTx.length?`<div class="card" style="padding:4px 16px">${dayTx.map(rowHtml).join('')}</div>`:'<div class="empty">Цього дня операцій немає.</div>'}`:'<div style="font-size:12px;color:var(--muted);text-align:center;margin-top:10px">Торкнись дня, щоб побачити операції.</div>';
    return `${hdr}${nav}${toggle}<div class="card"><div class="cal">${wd}${cells}</div></div>${dayBlock}`;
  }

  let mt=monthTxs();
  if(tagFilter)mt=mt.filter(t=>(t.tags||[]).includes(tagFilter));
  const fbar=D.tags.length?`<div class="chips" style="margin-bottom:12px"><button class="chip ${!tagFilter?'on':''}" data-ft="">Усі</button>${D.tags.map(t=>`<button class="chip ${tagFilter===t.id?'on':''}" data-ft="${t.id}"><span class="dot" style="background:${t.color}"></span>${esc(t.name)}</button>`).join('')}</div>`:'';
  const groups={};mt.forEach(t=>{const k=dayKey(new Date(t.occurred_at));(groups[k]=groups[k]||[]).push(t);});
  const blocks=Object.keys(groups).map(k=>{const arr=groups[k];const d=new Date(arr[0].occurred_at);
    const dsum=arr.reduce((s,t)=>s+(t.type==='income'?toUAH(Number(t.amount),accCur(t.account_id)):t.type==='expense'?-toUAH(Number(t.amount),accCur(t.account_id)):0),0);
    return `<div class="daylbl"><span>${WD[d.getDay()]}, ${pad(d.getDate())} ${MON[d.getMonth()]}</span><span class="sum">${dsum>=0?'+':'−'}${fmt0(Math.abs(dsum))}</span></div><div class="card" style="padding:4px 16px">${arr.map(rowHtml).join('')}</div>`;
  }).join('');
  return `${hdr}${nav}${toggle}${fbar}${mt.length?blocks:'<div class="empty"><strong>Порожньо</strong>Тут немає операцій за фільтром.</div>'}`;
}

function viewReport(){
  const mt=monthTxs();const am=accMap(),cm=catMap();
  const inc=mt.filter(t=>t.type==='income').reduce((s,t)=>s+toUAH(Number(t.amount),accCur(t.account_id)),0);
  const exp=mt.filter(t=>t.type==='expense').reduce((s,t)=>s+toUAH(Number(t.amount),accCur(t.account_id)),0);
  const saved=mt.filter(t=>t.type==='transfer'&&am[t.to_account_id]?.type==='savings').reduce((s,t)=>s+toUAH(Number(t.to_amount??t.amount),am[t.to_account_id]?.currency),0);
  const paid=mt.filter(t=>t.type==='transfer'&&am[t.to_account_id]?.type==='credit').reduce((s,t)=>s+toUAH(Number(t.to_amount??t.amount),am[t.to_account_id]?.currency),0);
  const saldo=inc-exp;
  const byCat={};mt.filter(t=>t.type==='expense').forEach(t=>byCat[t.category_id]=(byCat[t.category_id]||0)+toUAH(Number(t.amount),accCur(t.account_id)));
  const segs=Object.entries(byCat).map(([id,v])=>{const c=cm[id]||{name:'—',color:'#8A8F9E'};return{id,name:c.name,color:c.color,icon:c.icon,lucide:c.lucide,value:v};}).sort((a,b)=>b.value-a.value);
  const total=segs.reduce((s,x)=>s+x.value,0);
  const budgetCats=D.categories.filter(c=>c.kind==='expense'&&Number(c.budget)>0).map(c=>({...c,spent:byCat[c.id]||0,bud:Number(c.budget)})).sort((a,b)=>(b.spent/b.bud)-(a.spent/a.bud));
  const ms=new Set(D.txs.map(t=>monthKey(new Date(t.occurred_at))));ms.add(curMonth());
  const trend=[...ms].sort().slice(-6).map(k=>({k,v:D.txs.filter(t=>t.type==='expense'&&monthKey(new Date(t.occurred_at))===k).reduce((s,t)=>s+toUAH(Number(t.amount),accCur(t.account_id)),0)}));
  const mx=Math.max(1,...trend.map(t=>t.v));
  const nwSeries=[...ms].sort().slice(-6).map(k=>({k,v:netWorthAt(k+'-31T23:59:59')}));
  const nwMax=Math.max(1,...nwSeries.map(s=>Math.max(0,s.v)));
  return `
  <div class="hdr"><h1>Звіт</h1><div class="hdr-actions"><button class="iconbtn" id="themeBtn"><span data-icon="${curTheme()==='dark'?'Sun':'Moon'}"></span></button></div></div>
  <div class="monthnav"><button data-m="-1"><span data-icon="ChevronLeft"></span></button><div class="lbl">${monthTitle()}</div><button data-m="1"><span data-icon="ChevronRight"></span></button></div>
  <div class="card"><h2>Зведення за місяць</h2>
    <div class="sumgrid">
      <div class="sumcell"><div class="t">Доходи</div><div class="v pos">${fmt0(inc)}</div></div>
      <div class="sumcell"><div class="t">Витрати</div><div class="v neg">${fmt0(exp)}</div></div>
      <div class="sumcell"><div class="t">Сальдо</div><div class="v ${saldo<0?'neg':'pos'}">${saldo>=0?'+':'−'}${fmt0(Math.abs(saldo))}</div></div>
      <div class="sumcell"><div class="t">Накоплено</div><div class="v tr">${fmt0(saved)}</div></div>
    </div>
    <div style="margin-top:10px" class="sumcell"><div class="t">Виплачено по кредитах</div><div class="v" style="color:var(--accent)">${fmt0(paid)}</div></div>

    document.querySelectorAll('[data-cat-edit]').forEach(el=>el.onclick=()=>{const c=D.categories.find(x=>x.id===el.dataset.catEdit);if(c)openCategory(c);});
    const cms=document.getElementById('catMoreS');if(cms)cms.onclick=()=>{settingsCatsExpanded=!settingsCatsExpanded;renderApp();};
    document.getElementById('catAddBtn').onclick=()=>openCategory();
    document.getElementById('accAddBtn').onclick=()=>openAccount();
    const sa=document.getElementById('showArch');if(sa)sa.onchange=()=>{settingsShowArchived=sa.checked;renderApp();};
    document.querySelectorAll('[data-deltag]').forEach(b=>b.onclick=()=>delTag(b.dataset.deltag));
    document.getElementById('tagAdd').onclick=()=>{const n=document.getElementById('tagName').value.trim();if(!n)return;addTag(n);};
    document.querySelectorAll('[data-deltpl]').forEach(b=>b.onclick=()=>{if(confirm('Видалити шаблон?'))delTemplate(b.dataset.deltpl);});
    document.getElementById('exportBtn').onclick=exportCSV;
    document.getElementById('signout').onclick=async()=>{await sb.auth.signOut();};
    document.getElementById('recfg').onclick=()=>renderCfg();
  }
}

  else{sheet={planMode:true,planId:null,type:'expense',amount:'',accountId:D.accounts[0]?.id,toAccountId:D.accounts[1]?.id||D.accounts[0]?.id,categoryId:exp[0]?.id,note:'',toAmount:'',tags:[],nextDate:todayDate(),repeat:'monthly'};}

function openTemplate(t){

async function delTemplate(id){const{error}=await sb.from('templates').delete().eq('id',id);if(error){alert(error.message);return;}await loadData();}

async function saveCategory(){
  const s=catSheet;if(!s.name.trim())return;
  const budget=s.kind==='expense'&&s.budgetOn?(num(s.budget)||0):0;
  const row={kind:s.kind,name:s.name.trim(),icon:s.icon||'•',lucide:s.lucide||null,color:s.color,budget};
  let res=s.id?await sb.from('categories').update(row).eq('id',s.id):await sb.from('categories').insert({...row,sort:D.categories.length});
  if(res.error){alert(res.error.message);return;}
  closeCatSheet();await loadData();

async function openRatesChart(days){
  const o=document.getElementById('rov');if(o)o.remove();
  document.body.insertAdjacentHTML('beforeend',`<div class="overlay" id="rov"><div class="sheet"><div class="sheet-grip"></div><div class="loading">Завантаження курсу…</div></div></div>`);
  const rov=document.getElementById('rov');rov.onclick=e=>{if(e.target===rov)rov.remove();};
  const end=new Date(),start=new Date();start.setDate(end.getDate()-days+1);
  const fmtd=d=>`${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}`;
  const url=cc=>`https://bank.gov.ua/NBU_Exchange/exchange_site?start=${fmtd(start)}&end=${fmtd(end)}&valcode=${cc}&sort=exchangedate&order=asc&json`;
  try{
    const [ru,re]=await Promise.all([fetch(url('usd')).then(r=>r.json()),fetch(url('eur')).then(r=>r.json())]);
    const u=ru.map(x=>Number(x.rate)),e=re.map(x=>Number(x.rate));
    if(!u.length&&!e.length)throw new Error('empty');
    const W=320,H=150,p=10;const all=[...u,...e];const mn=Math.min(...all),mx=Math.max(...all),rng=(mx-mn)||1;
    const pts=arr=>arr.map((v,i)=>`${(p+i/((arr.length-1)||1)*(W-2*p)).toFixed(1)},${(H-p-((v-mn)/rng)*(H-2*p)).toFixed(1)}`).join(' ');
    const line=(arr,col)=>arr.length?`<polyline fill="none" stroke="${col}" stroke-width="2.2" stroke-linejoin="round" points="${pts(arr)}"/>`:'';
    const svg=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">${line(u,'var(--accent)')}${line(e,'var(--muted)')}</svg>`;
    const last=a=>a.length?a[a.length-1].toFixed(2):'—';const first=a=>a.length?a[0]:0;
    const delta=a=>{if(a.length<2)return '';const d=a[a.length-1]-first(a);return ` <span style="color:${d>=0?'var(--income)':'var(--expense)'}">${d>=0?'▲':'▼'}${Math.abs(d).toFixed(2)}</span>`;};
    document.getElementById('rov').querySelector('.sheet').innerHTML=`<div class="sheet-grip"></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><h2 style="font-family:var(--display);font-size:17px;font-weight:700">Динаміка курсу · ${days===7?'тиждень':'місяць'}</h2><button class="iconbtn" id="rClose" style="width:34px;height:34px"><span data-icon="X"></span></button></div>
      ${svg}
      <div class="chips" style="margin-top:12px"><span class="chip"><span class="dot" style="background:var(--accent)"></span>USD ${last(u)} ₴${delta(u)}</span><span class="chip"><span class="dot" style="background:var(--muted)"></span>EUR ${last(e)} ₴${delta(e)}</span></div>
      <div style="font-size:11px;color:var(--muted);margin-top:10px">Джерело: Національний банк України</div>`;
    document.getElementById('rClose').onclick=()=>document.getElementById('rov').remove();
    paintIcons(document.getElementById('rov'));
  }catch(err){
    const sh=document.getElementById('rov');if(sh)sh.querySelector('.sheet').innerHTML=`<div class="sheet-grip"></div><div class="empty"><strong>Не вдалося завантажити</strong>Курс НБУ зараз недоступний. Спробуй пізніше.</div><button class="btn line block" id="rClose">Закрити</button>`;
    const rc=document.getElementById('rClose');if(rc)rc.onclick=()=>document.getElementById('rov').remove();
  }
}

function openAccount(a){
  if(a)acctSheet={id:a.id,name:a.name,icon:a.icon||'💳',type:a.type==='regular'?'card':a.type,currency:a.currency,initial:String(a.initial??0),credit_limit:String(a.credit_limit??0),due_date:a.due_date||'',interest_rate:a.interest_rate!=null?String(a.interest_rate):'',stmt_day:a.stmt_day!=null?String(a.stmt_day):'',due_day:a.due_day!=null?String(a.due_day):'',min_payment:a.min_payment!=null?String(a.min_payment):'',in_networth:a.in_networth!==false,archived:!!a.archived};
  else acctSheet={id:null,name:'',icon:'💳',type:'card',currency:'UAH',initial:'0',credit_limit:'0',due_date:'',interest_rate:'',stmt_day:'',due_day:'',min_payment:'',in_networth:true,archived:false};
  acctInit=JSON.stringify(acctSheet);renderAcctSheet();
}
function closeAcctSheet(){acctSheet=null;acctInit=null;const o=document.getElementById('aov');if(o)o.remove();}
function snapshotAcct(){const g=id=>document.getElementById(id);if(g('acName'))acctSheet.name=g('acName').value;if(g('acIcon'))acctSheet.icon=g('acIcon').value;if(g('acInit'))acctSheet.initial=g('acInit').value;if(g('acLimit'))acctSheet.credit_limit=g('acLimit').value;if(g('acDue'))acctSheet.due_date=g('acDue').value;if(g('acRate'))acctSheet.interest_rate=g('acRate').value;if(g('acStmt'))acctSheet.stmt_day=g('acStmt').value;if(g('acDueD'))acctSheet.due_day=g('acDueD').value;if(g('acMin'))acctSheet.min_payment=g('acMin').value;if(g('acNW'))acctSheet.in_networth=g('acNW').checked;if(g('acArch'))acctSheet.archived=g('acArch').checked;}
function renderAcctSheet(){
  let o=document.getElementById('aov');if(o)o.remove();if(!acctSheet)return;
  const s=acctSheet;
  const html=`<div class="overlay" id="aov"><div class="sheet"><div class="sheet-grip"></div>
    <div style="display:flex;justify-content:flex-end;margin:-6px -4px 2px"><button class="iconbtn" id="acClose" style="width:34px;height:34px"><span data-icon="X"></span></button></div>
    <div class="two mb"><div style="flex:0 0 70px"><label class="fld">Іконка</label><input id="acIcon" class="ico-in" style="width:100%" value="${esc(s.icon)}"></div><div><label class="fld">Назва</label><input id="acName" value="${esc(s.name)}" placeholder="Напр. Олеся / MONO"></div></div>
    ${iconGrid(s.icon,'acIcons')}
    <div class="two mb"><div><label class="fld">Тип</label><select id="acType">${ATYPES.map(t=>`<option value="${t[0]}" ${t[0]===s.type?'selected':''}>${t[1]}</option>`).join('')}</select></div><div><label class="fld">Валюта</label><select id="acCur">${CURS.map(c=>`<option value="${c}" ${c===s.currency?'selected':''}>${c}</option>`).join('')}</select></div></div>
    <div class="mb"><label class="fld">${s.type==='debt'?'Поточний баланс (＋ винні мені / − я винен)':'Початковий баланс'}</label><input id="acInit" type="number" inputmode="decimal" value="${esc(s.initial)}"></div>
    ${s.type==='credit'?`<div class="mb"><label class="fld">Кредитний ліміт</label><input id="acLimit" type="number" inputmode="decimal" value="${esc(s.credit_limit)}"></div>
    <div class="two mb"><div><label class="fld">Ставка %/рік</label><input id="acRate" type="number" inputmode="decimal" value="${esc(s.interest_rate)}" placeholder="напр. 35"></div><div><label class="fld">Мін. платіж %</label><input id="acMin" type="number" inputmode="decimal" value="${esc(s.min_payment)}" placeholder="напр. 5"></div></div>
    <div class="two mb"><div><label class="fld">День виписки</label><input id="acStmt" type="number" inputmode="numeric" min="1" max="31" value="${esc(s.stmt_day)}" placeholder="1–31"></div><div><label class="fld">День платежу</label><input id="acDueD" type="number" inputmode="numeric" min="1" max="31" value="${esc(s.due_day)}" placeholder="1–31"></div></div>`:''}
    ${s.type==='debt'?`<div class="two mb"><div><label class="fld">Дата повернення</label><input id="acDue" type="date" value="${esc(s.due_date)}"></div><div><label class="fld">Ставка %/рік</label><input id="acRate" type="number" inputmode="decimal" value="${esc(s.interest_rate)}" placeholder="необов'язково"></div></div>`:''}
    <label class="chkrow"><input type="checkbox" id="acNW" ${s.in_networth?'checked':''}> Враховувати в «Чистому капіталі»</label>
    ${s.id?`<label class="chkrow"><input type="checkbox" id="acArch" ${s.archived?'checked':''}> Архівний (сховати зі списку)</label>`:''}
    <button class="btn block" id="acSave" style="margin-top:14px">${s.id?'Зберегти':'Додати рахунок'}</button>
    ${s.id?`<button class="btn danger block" id="acDel" style="margin-top:8px">Видалити</button>`:''}
  </div></div>`;
  document.body.insertAdjacentHTML('beforeend',html);
  const ov=document.getElementById('aov');ov.onclick=e=>{if(e.target===ov)attemptCloseAcct();};document.getElementById('acClose').onclick=attemptCloseAcct;
  document.getElementById('acType').onchange=e=>{snapshotAcct();acctSheet.type=e.target.value;renderAcctSheet();};
  ov.querySelectorAll('#acIcons .icobtn').forEach(b=>b.onclick=()=>{acctSheet.icon=b.dataset.ico;const inp=document.getElementById('acIcon');if(inp)inp.value=b.dataset.ico;ov.querySelectorAll('#acIcons .icobtn').forEach(x=>x.classList.remove('on'));b.classList.add('on');});
  document.getElementById('acCur').onchange=e=>{acctSheet.currency=e.target.value;};
  document.getElementById('acSave').onclick=()=>{snapshotAcct();saveAccount();};
  const dl=document.getElementById('acDel');if(dl)dl.onclick=async()=>{const id=acctSheet.id;if(confirm('Видалити рахунок? Його операції лишаться без рахунку.')){closeAcctSheet();const{error}=await sb.from('accounts').delete().eq('id',id);if(error){alert(error.message);return;}await loadData();}};
  if(paintIcons)paintIcons();
}
async function saveAccount(){
  const s=acctSheet;if(!s.name.trim())return;
  const row={name:s.name.trim(),icon:(s.icon||'💳').trim()||'💳',type:s.type,currency:s.currency,initial:num(s.initial)||0,credit_limit:num(s.credit_limit)||0,due_date:s.type==='debt'&&s.due_date?s.due_date:null,interest_rate:(s.type==='debt'||s.type==='credit')&&num(s.interest_rate)?num(s.interest_rate):null,stmt_day:s.type==='credit'&&parseInt(s.stmt_day)?Math.min(31,Math.max(1,parseInt(s.stmt_day))):null,due_day:s.type==='credit'&&parseInt(s.due_day)?Math.min(31,Math.max(1,parseInt(s.due_day))):null,min_payment:s.type==='credit'&&num(s.min_payment)?num(s.min_payment):null,in_networth:!!s.in_networth,archived:!!s.archived};
  let res=s.id?await sb.from('accounts').update(row).eq('id',s.id):await sb.from('accounts').insert({...row,sort:D.accounts.length});
  if(res.error){alert(res.error.message);return;}
  closeAcctSheet();await loadData();
}
function snapshotSheet(){const a=document.getElementById('shAmount');if(a)sheet.amount=a.value;const n=document.getElementById('shNote');if(n)sheet.note=n.value;const ta=document.getElementById('shToAmt');if(ta)sheet.toAmount=ta.value;const d=document.getElementById('shDate');if(d){if(sheet.planMode)sheet.nextDate=d.value;else sheet.date=d.value;}const rp=document.getElementById('shRepeat');if(rp)sheet.repeat=rp.value;}
function renderSheet(){
  let o=document.getElementById('ov');if(o)o.remove();
  if(!sheet)return;
  const usage={};D.txs.forEach(t=>{if(t.category_id)usage[t.category_id]=(usage[t.category_id]||0)+1;});
  const cats=D.categories.filter(c=>c.kind===(sheet.type==='income'?'income':'expense')).slice().sort((a,b)=>(usage[b.id]||0)-(usage[a.id]||0));
  const shownCats=sheet.catsExpanded?cats:cats.slice(0,16);
  const opt=(a)=>D.accounts.map(x=>`<option value="${x.id}" ${x.id===a?'selected':''}>${esc(x.icon)} ${esc(x.name)} (${x.currency})</option>`).join('');
  const diffCur=sheet.type==='transfer'&&accCur(sheet.accountId)!==accCur(sheet.toAccountId);
  const createdRef=sheet.createdAt||new Date().toISOString();
  const dateDiffers=!sheet.planMode&&sheet.date&&dayOf(sheet.date)!==dayOf(createdRef);
  const accBlock=sheet.type==='transfer'
    ? `<div class="two mb"><div><label class="fld">З рахунку</label><select id="shAcc">${opt(sheet.accountId)}</select></div><div><label class="fld">На рахунок</label><select id="shTo">${opt(sheet.toAccountId)}</select></div></div>${diffCur?`<div class="mb"><label class="fld">Сума зарахування (${accCur(sheet.toAccountId)})</label><input id="shToAmt" type="number" inputmode="decimal" placeholder="0" value="${esc(sheet.toAmount)}"></div>`:''}`
    : `<div class="mb"><label class="fld">Рахунок</label><select id="shAcc">${opt(sheet.accountId)}</select></div>`;
  const dateBlock=sheet.planMode
    ? `<div class="two mb"><div><label class="fld">Наступна дата</label><input id="shDate" type="date" value="${esc(sheet.nextDate)}"></div><div><label class="fld">Повторення</label><select id="shRepeat">${REPEATS.map(r=>`<option value="${r[0]}" ${r[0]===sheet.repeat?'selected':''}>${r[1]}</option>`).join('')}</select></div></div>`
    : `<div class="mb"><label class="fld">Дата операції</label><input id="shDate" type="datetime-local" value="${esc(sheet.date)}"></div>${dateDiffers?`<div style="font-size:11.5px;color:var(--muted);margin:-7px 2px 13px">Дата створення: <span class="mono">${fmtTs(createdRef)}</span></div>`:''}`;
  const noteBlock=`<div class="mb"><label class="fld">Нотатка</label><input id="shNote" type="text" placeholder="напр. Lifecell, барбер…" value="${esc(sheet.note)}" maxlength="80"></div>`;
  const catBlock=sheet.type!=='transfer'?`<label class="fld">Категорія</label><div class="catgrid">${shownCats.map(c=>`<button class="catpick ${c.id===sheet.categoryId?'sel':''}" data-cat="${c.id}">${tile(c)}<span class="nm">${esc(c.name)}</span></button>`).join('')}</div>${cats.length>16?`<button class="btn line block" id="catMore" style="margin:2px 0 14px;padding:9px">${sheet.catsExpanded?'Згорнути':'Показати ще ('+(cats.length-16)+')'}</button>`:''}`:'';
  const tagsBlock=D.tags.length?`<div class="mb"><label class="fld">Мітки</label><div class="chips" id="shTags">${D.tags.map(t=>`<button type="button" class="chip ${sheet.tags.includes(t.id)?'on':''}" data-tag="${t.id}"><span class="dot" style="background:${t.color}"></span>${esc(t.name)}</button>`).join('')}</div></div>`:'';
  const html=`<div class="overlay" id="ov"><div class="sheet">
    <div class="sheet-grip"></div>
    <div style="display:flex;justify-content:flex-end;margin:-6px -4px 2px"><button class="iconbtn" id="shClose" style="width:34px;height:34px"><span data-icon="X"></span></button></div>
    <div class="seg">
      <button data-t="expense" class="${sheet.type==='expense'?'on exp':''}">Витрата</button>
      <button data-t="income" class="${sheet.type==='income'?'on inc':''}">Дохід</button>
      <button data-t="transfer" class="${sheet.type==='transfer'?'on trf':''}">Переказ</button>
    </div>
    <input id="shAmount" class="amount-in" type="number" inputmode="decimal" placeholder="0" value="${esc(sheet.amount)}" autofocus>
    ${accBlock}
    ${dateBlock}
    ${noteBlock}
    ${catBlock}
    ${tagsBlock}
    <button class="btn block" id="shSave">${sheet.planMode?(sheet.planId?'Зберегти план':'Запланувати'):(sheet.id?'Зберегти зміни':'Додати')}</button>
    ${(sheet.id||sheet.planId)?`<button class="btn danger block" id="shDel" style="margin-top:8px">Видалити</button>`:''}
    ${!sheet.planMode?`<button class="btn line block" id="shTpl" style="margin-top:8px">★ Зберегти як шаблон</button>`:''}
  </div></div>`;
  document.body.insertAdjacentHTML('beforeend',html);
  const ov=document.getElementById('ov');
  ov.onclick=e=>{if(e.target===ov)attemptCloseSheet();};
  document.getElementById('shClose').onclick=attemptCloseSheet;
  ov.querySelectorAll('.seg button[data-t]').forEach(b=>b.onclick=()=>{snapshotSheet();sheet.type=b.dataset.t;if(sheet.type!=='transfer'){const cc=D.categories.filter(c=>c.kind===(sheet.type==='income'?'income':'expense'));if(!cc.find(c=>c.id===sheet.categoryId))sheet.categoryId=cc[0]?.id;}renderSheet();});
  const acc=document.getElementById('shAcc');if(acc)acc.onchange=e=>{sheet.accountId=e.target.value;if(sheet.type==='transfer'){snapshotSheet();renderSheet();}};
  const to=document.getElementById('shTo');if(to)to.onchange=e=>{sheet.toAccountId=e.target.value;snapshotSheet();renderSheet();};
  ov.querySelectorAll('[data-cat]').forEach(b=>b.onclick=()=>{sheet.categoryId=b.dataset.cat;ov.querySelectorAll('[data-cat]').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');});
  const cmore=document.getElementById('catMore');if(cmore)cmore.onclick=()=>{snapshotSheet();sheet.catsExpanded=!sheet.catsExpanded;renderSheet();};
  ov.querySelectorAll('#shTags .chip').forEach(b=>b.onclick=()=>{const id=b.dataset.tag;const i=sheet.tags.indexOf(id);if(i>=0)sheet.tags.splice(i,1);else sheet.tags.push(id);b.classList.toggle('on');});
  document.getElementById('shSave').onclick=()=>{snapshotSheet();sheet.planMode?savePlan():saveTx();};
  const dl=document.getElementById('shDel');if(dl)dl.onclick=()=>{if(confirm(sheet.planMode?'Видалити план?':'Видалити операцію?')){sheet.planMode?delPlan(sheet.planId):delTx(sheet.id);}};
  const tpb=document.getElementById('shTpl');if(tpb)tpb.onclick=()=>{snapshotSheet();if(sheet.type!=='transfer'&&!sheet.categoryId){alert('Спершу оберіть категорію');return;}addTemplate();};
  paintIcons(ov);
}

function exportCSV(){
  const am=accMap(),cm=catMap(),tm=tagMap();
  const head=['Дата','Тип','Сума','Валюта','Рахунок','На рахунок','Сума зарах.','Категорія','Нотатка','Мітки'];
  const rows=[...D.txs].sort((a,b)=>new Date(a.occurred_at)-new Date(b.occurred_at)).map(t=>{
    const d=new Date(t.occurred_at);const dt=`${pad(d.getDate())}.${pad(d.getMonth()+1)}.${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    const typ=t.type==='income'?'Дохід':t.type==='expense'?'Витрата':'Переказ';
    return [dt,typ,String(t.amount).replace('.',','),accCur(t.account_id),am[t.account_id]?.name||'',t.to_account_id?(am[t.to_account_id]?.name||''):'',t.to_amount!=null?String(t.to_amount).replace('.',','):'',t.category_id?(cm[t.category_id]?.name||''):'',t.note||'',(t.tags||[]).map(id=>tm[id]?.name).filter(Boolean).join(' ')];
  });
  const csv=[head,...rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(';')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='finance.csv';a.click();URL.revokeObjectURL(url);
}
