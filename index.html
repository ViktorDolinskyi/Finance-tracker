<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Облік витрат</title>
<meta name="theme-color" content="#16181F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Витрати">
<link rel="manifest" href='data:application/manifest+json,{"name":"Облік витрат","short_name":"Витрати","start_url":".","display":"standalone","background_color":"%23EAEBEF","theme_color":"%2316181F"}'>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@500;600&display=swap');
  :root{
    --bg:#EAEBEF;--surface:#FFFFFF;--ink:#16181F;--muted:#71768A;--line:#E4E6ED;--line-soft:#EFF1F5;
    --accent:#4F46E5;--accent-soft:#EEEDFB;--danger:#D8443C;
    --display:'Space Grotesk',system-ui,-apple-system,sans-serif;
    --body:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,'SF Mono',Menlo,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--body);color:var(--ink);background:var(--bg);min-height:100vh;line-height:1.45;-webkit-font-smoothing:antialiased}
  .app{padding:clamp(14px,3vw,32px);padding-bottom:40px}
  .wrap{max-width:940px;margin:0 auto}
  .topbar{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:20px}
  .brand{display:flex;align-items:center;gap:11px}
  .brand .mark{width:34px;height:34px;border-radius:9px;background:var(--ink);color:#fff;display:grid;place-items:center;font-family:var(--display);font-weight:700;font-size:19px}
  .brand h1{font-family:var(--display);font-size:21px;font-weight:700;letter-spacing:-.01em}
  .brand p{font-size:12.5px;color:var(--muted);margin-top:1px}
  .acct{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted)}
  .scope{display:flex;align-items:center;gap:8px}
  .scope label{font-size:12px;color:var(--muted)}
  select,input{font-family:var(--body);font-size:14px;color:var(--ink);background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:9px 11px;outline:none;transition:border-color .15s,box-shadow .15s}
  select:focus,input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .grid{display:grid;gap:14px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:18px}
  .card h2{font-family:var(--display);font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:14px}
  .hero{display:grid;grid-template-columns:200px 1fr;gap:22px;align-items:center}
  .donut-wrap{position:relative;width:200px;height:200px}
  .donut-center{position:absolute;inset:0;display:grid;place-content:center;text-align:center}
  .donut-center .label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
  .donut-center .total{font-family:var(--mono);font-size:24px;font-weight:600;letter-spacing:-.02em;margin-top:3px}
  .legend{display:flex;flex-direction:column;gap:9px}
  .legend-row{display:flex;align-items:center;gap:10px;font-size:14px}
  .legend-row .dot{width:11px;height:11px;border-radius:4px;flex:none}
  .legend-row .name{flex:1}
  .legend-row .amt{font-family:var(--mono);font-weight:500}
  .legend-row .pct{font-family:var(--mono);font-size:12px;color:var(--muted);width:42px;text-align:right}
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:16px 18px}
  .stat .k{font-size:12px;color:var(--muted)}
  .stat .v{font-family:var(--mono);font-size:26px;font-weight:600;letter-spacing:-.02em;margin-top:4px}
  .stat .sub{font-size:12px;color:var(--muted);margin-top:3px}
  .form-grid{display:grid;grid-template-columns:1.1fr 1.3fr 1fr;gap:10px}
  .field{display:flex;flex-direction:column;gap:5px}
  .field span{font-size:11.5px;color:var(--muted);font-weight:500}
  .field input,.field select{width:100%}
  .addbar{display:flex;gap:10px;margin-top:12px}
  .addbar input{flex:1}
  .btn{font-family:var(--display);font-weight:600;font-size:14px;border:none;border-radius:10px;padding:10px 18px;cursor:pointer;background:var(--accent);color:#fff;transition:filter .15s,transform .05s;white-space:nowrap}
  .btn:hover{filter:brightness(1.07)}
  .btn:active{transform:translateY(1px)}
  .btn.ghost{background:transparent;color:var(--muted);border:1px solid var(--line)}
  .btn.ghost:hover{color:var(--danger);border-color:var(--danger);filter:none}
  .twocol{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .bars{display:flex;align-items:flex-end;gap:10px;height:150px;padding-top:8px}
  .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}
  .bar{width:100%;max-width:38px;background:var(--accent);border-radius:6px 6px 3px 3px;transition:height .4s cubic-bezier(.2,.7,.2,1);min-height:3px}
  .bar.dim{background:var(--accent-soft)}
  .bar-col .m{font-size:11px;color:var(--muted)}
  .bar-col .a{font-family:var(--mono);font-size:10.5px;color:var(--ink);font-weight:500}
  .tx{display:flex;align-items:center;gap:12px;padding:11px 2px;border-bottom:1px solid var(--line-soft)}
  .tx:last-child{border-bottom:none}
  .tx .cat-dot{width:9px;height:9px;border-radius:3px;flex:none}
  .tx .info{flex:1;min-width:0}
  .tx .info .top{display:flex;gap:8px;align-items:baseline}
  .tx .info .cat{font-weight:600;font-size:14px}
  .tx .info .note{font-size:13px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tx .info .date{font-size:11.5px;color:var(--muted)}
  .tx .amt{font-family:var(--mono);font-weight:600;font-size:15px}
  .tx .del{border:none;background:none;color:var(--muted);cursor:pointer;font-size:16px;padding:4px 7px;border-radius:7px;line-height:1;opacity:.55}
  .tx .del:hover{color:var(--danger);background:#fbeceb;opacity:1}
  .empty{text-align:center;color:var(--muted);font-size:14px;padding:26px 10px}
  .empty strong{color:var(--ink);font-family:var(--display);display:block;margin-bottom:4px;font-size:15px}
  .footer{display:flex;justify-content:space-between;align-items:center;margin-top:16px;gap:12px;flex-wrap:wrap}
  .footer .note{font-size:12px;color:var(--muted)}
  .footer a{color:var(--muted);font-size:12px;cursor:pointer;text-decoration:underline}
  /* centered panels: loading / auth / settings */
  .panel{max-width:420px;margin:8vh auto 0;background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:26px}
  .panel h2{font-family:var(--display);font-size:20px;margin-bottom:6px}
  .panel p{font-size:13.5px;color:var(--muted);margin-bottom:16px}
  .panel .field{margin-bottom:12px}
  .panel .btn{width:100%;padding:12px}
  .msg{font-size:13px;margin-top:12px;padding:10px 12px;border-radius:10px}
  .msg.ok{background:#e9f7f0;color:#0c6b4f}
  .msg.err{background:#fbeceb;color:#a82a23}
  .loading{text-align:center;padding:60px 20px;color:var(--muted);font-family:var(--display)}
  @media (max-width:720px){.hero{grid-template-columns:1fr;justify-items:center;text-align:center}.legend{width:100%}.form-grid{grid-template-columns:1fr 1fr}.twocol{grid-template-columns:1fr}}
  @media (max-width:460px){.form-grid{grid-template-columns:1fr}.stats{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app"><div class="wrap" id="root"><div class="loading">Завантаження…</div></div></div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const CATEGORIES = [
  {id:'prod',icon:'🛒',name:'Продукти',color:'#F2683C'},
  {id:'cafe',icon:'🍽️',name:'Кафе та ресторани',color:'#E8543E'},
  {id:'cloth',icon:'👕',name:'Одяг',color:'#3C82E5'},
  {id:'transport',icon:'🚗',name:'Транспорт',color:'#2563C9'},
  {id:'selfdev',icon:'📚',name:'Саморозвиток',color:'#6D5BD0'},
  {id:'health',icon:'🩺',name:"Здоров'я",color:'#1FA37A'},
  {id:'home',icon:'🏠',name:'Дім (оренда, комуналка)',color:'#C0682E'},
  {id:'gifts',icon:'🎁',name:'Подарунки',color:'#E5489B'},
  {id:'parents',icon:'👪',name:'Батьки',color:'#B5651D'},
  {id:'charity',icon:'🤝',name:'Благодійність',color:'#15A0B0'},
  {id:'hygiene',icon:'🧴',name:'Гігієна',color:'#4FB0C6'},
  {id:'beauty',icon:'💈',name:'Догляд, краса',color:'#D6457E'},
  {id:'emotional',icon:'🎭',name:'Емоційні',color:'#8E5FE8'},
  {id:'comms',icon:'📱',name:"Зв'язок, інтернет",color:'#3AA0E0'},
  {id:'coffee',icon:'☕',name:'Кава, чай',color:'#8B5A2B'},
  {id:'kamila',icon:'👩',name:'Каміла',color:'#E36A9E'},
  {id:'credit',icon:'💳',name:'Кредити',color:'#D8443C'},
  {id:'olesya',icon:'👩‍🦰',name:'Олеся',color:'#C0509E'},
  {id:'ops',icon:'🗂️',name:'Операційні',color:'#5B8DEF'},
  {id:'smoking',icon:'🚬',name:'Паління',color:'#7A7F8C'},
  {id:'taxes',icon:'🧾',name:'Податки',color:'#C2410C'},
  {id:'trips',icon:'🧳',name:'Поїздки',color:'#0EA5A0'},
  {id:'fun',icon:'🎉',name:'Розваги',color:'#E0A100'},
  {id:'sport',icon:'⚽',name:'Спорт',color:'#16A34A'},
  {id:'hobby',icon:'🗄️',name:'Хобі, затишок',color:'#7C4DC0'},
  {id:'croatia',icon:'🔑',name:'Хорватська',color:'#DC2626'},
];
const FALLBACK={id:'other',icon:'🏷️',name:'Інше',color:'#8A8F9E'};
const catById=id=>CATEGORIES.find(c=>c.id===id)||FALLBACK;
const money=new Intl.NumberFormat('uk-UA',{style:'currency',currency:'UAH',maximumFractionDigits:0});
const moneyExact=new Intl.NumberFormat('uk-UA',{style:'currency',currency:'UAH',minimumFractionDigits:2});

const root=document.getElementById('root');
let sb=null, user=null;
let state={expenses:[],scope:'thisMonth',confirmClear:false};

const monthKey=d=>d.slice(0,7);
const todayStr=()=>new Date().toISOString().slice(0,10);
const curMonth=()=>todayStr().slice(0,7);
const monthLabel=ym=>{const[y,m]=ym.split('-');return new Date(+y,+m-1,1).toLocaleDateString('uk-UA',{month:'long',year:'numeric'});};
const shortMonth=ym=>{const[y,m]=ym.split('-');return new Date(+y,+m-1,1).toLocaleDateString('uk-UA',{month:'short'});};
const esc=s=>s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const getCfg=()=>{try{return JSON.parse(localStorage.getItem('cfg')||'null')}catch{return null}};
const setCfg=c=>localStorage.setItem('cfg',JSON.stringify(c));

// ---------- boot ----------
init();
async function init(){
  const cfg=getCfg();
  if(!cfg||!cfg.url||!cfg.key){return renderSettings();}
  sb=createClient(cfg.url,cfg.key);
  const {data:{session}}=await sb.auth.getSession();
  sb.auth.onAuthStateChange((_e,s)=>{user=s?.user||null; user?afterLogin():renderAuth();});
  user=session?.user||null;
  user?afterLogin():renderAuth();
}
async function afterLogin(){
  // show cache instantly, then refresh from cloud
  try{const c=JSON.parse(localStorage.getItem('cache')||'[]'); if(c.length){state.expenses=c; render();}}catch{}
  await loadExpenses();
}

// ---------- settings (one-time) ----------
function renderSettings(prefill){
  const c=prefill||getCfg()||{};
  root.innerHTML=`<div class="panel">
    <h2>Налаштування</h2>
    <p>Встав дані свого проєкту Supabase. Знайдеш їх у Project Settings → API.</p>
    <div class="field"><span>Project URL</span><input id="url" placeholder="https://xxxx.supabase.co" value="${c.url||''}"></div>
    <div class="field"><span>anon public key</span><input id="key" placeholder="eyJ..." value="${c.key||''}"></div>
    <button class="btn" id="save">Зберегти й продовжити</button>
    <div id="m"></div>
  </div>`;
  document.getElementById('save').onclick=()=>{
    const url=document.getElementById('url').value.trim();
    const key=document.getElementById('key').value.trim();
    if(!/^https:\/\/.+\.supabase\.co/.test(url)||key.length<20){document.getElementById('m').innerHTML='<div class="msg err">Перевір URL і ключ.</div>';return;}
    setCfg({url,key}); init();
  };
}

// ---------- auth (email + password) ----------
function renderAuth(){
  root.innerHTML=`<div class="panel">
    <h2>Вхід</h2>
    <p>Увійди або створи акаунт. Дані бачиш лише ти.</p>
    <div class="field"><span>Email</span><input id="email" type="email" placeholder="you@example.com"></div>
    <div class="field"><span>Пароль</span><input id="pass" type="password" placeholder="мінімум 6 символів"></div>
    <button class="btn" id="in">Увійти</button>
    <button id="up" style="width:100%;margin-top:8px;font-family:var(--display);font-weight:600;font-size:14px;border:1px solid var(--line);border-radius:10px;padding:10px 18px;cursor:pointer;background:transparent;color:var(--accent)">Створити акаунт</button>
    <div id="m"></div>
    <div class="footer" style="margin-top:14px"><a id="cfg">Змінити налаштування Supabase</a></div>
  </div>`;
  document.getElementById('cfg').onclick=()=>renderSettings();
  const getv=()=>({email:document.getElementById('email').value.trim(),password:document.getElementById('pass').value});
  const m=()=>document.getElementById('m');
  document.getElementById('in').onclick=async()=>{
    const {email,password}=getv();
    if(!email||!password){m().innerHTML='<div class="msg err">Вкажи email і пароль.</div>';return;}
    const {error}=await sb.auth.signInWithPassword({email,password});
    if(error)m().innerHTML=`<div class="msg err">${esc(error.message)}</div>`;
  };
  document.getElementById('up').onclick=async()=>{
    const {email,password}=getv();
    if(!email||password.length<6){m().innerHTML='<div class="msg err">Email і пароль (мін. 6 символів).</div>';return;}
    const {data,error}=await sb.auth.signUp({email,password});
    if(error){m().innerHTML=`<div class="msg err">${esc(error.message)}</div>`;return;}
    if(!data.session)m().innerHTML='<div class="msg ok">Акаунт створено. Тепер натисни «Увійти».</div>';
  };
}

// ---------- data ----------
async function loadExpenses(){
  const {data,error}=await sb.from('expenses').select('id,amount,category,spent_on,note').order('spent_on',{ascending:false});
  if(error){root.innerHTML=`<div class="panel"><h2>Помилка</h2><p>${esc(error.message)}</p><p>Схоже, таблицю ще не створено або немає доступу. Перевір крок із SQL.</p><button class="btn" id="r">Спробувати ще</button></div>`;document.getElementById('r').onclick=loadExpenses;return;}
  state.expenses=(data||[]).map(r=>({id:r.id,amount:Number(r.amount),category:r.category,date:r.spent_on,note:r.note||''}));
  localStorage.setItem('cache',JSON.stringify(state.expenses));
  render();
}
async function addExpense(){
  const amt=document.getElementById('amt'),cat=document.getElementById('cat'),date=document.getElementById('date'),note=document.getElementById('note');
  const amount=parseFloat(amt.value);
  if(!amount||amount<=0){amt.focus();amt.style.borderColor='var(--danger)';return;}
  const row={amount:Math.round(amount*100)/100,category:cat.value,spent_on:date.value||todayStr(),note:note.value.trim()};
  if(state.scope!=='all')state.scope=monthKey(row.spent_on);
  const {error}=await sb.from('expenses').insert(row);
  if(error){alert('Не вдалося зберегти: '+error.message);return;}
  await loadExpenses();
}
async function removeExpense(id){
  const {error}=await sb.from('expenses').delete().eq('id',id);
  if(error){alert('Не вдалося видалити: '+error.message);return;}
  await loadExpenses();
}
async function clearAll(){
  const {error}=await sb.from('expenses').delete().neq('id','00000000-0000-0000-0000-000000000000');
  if(!error)await loadExpenses();
}

// ---------- view helpers ----------
function donutSVG(segs,totalText,label){
  const r=70,cx=100,cy=100,circ=2*Math.PI*r;let off=0;
  const sum=segs.reduce((s,x)=>s+x.value,0);
  const arcs=sum===0?`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--line)" stroke-width="22"/>`
    :segs.map(s=>{const len=s.value/sum*circ;const d=`${len} ${circ-len}`;const o=-off;off+=len;
      return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="22" stroke-dasharray="${d}" stroke-dashoffset="${o}" transform="rotate(-90 ${cx} ${cy})"/>`;}).join('');
  return `<div class="donut-wrap"><svg viewBox="0 0 200 200" width="200" height="200">${arcs}</svg><div class="donut-center"><div class="label">${label}</div><div class="total">${totalText}</div></div></div>`;
}
function scoped(){return state.scope==='all'?state.expenses:state.expenses.filter(e=>monthKey(e.date)===state.scope);}
function months(){const s=new Set(state.expenses.map(e=>monthKey(e.date)));s.add(curMonth());return[...s].sort().reverse();}

function render(){
  const sc=scoped();
  const byCat={};sc.forEach(e=>byCat[e.category]=(byCat[e.category]||0)+e.amount);
  const segs=CATEGORIES.map(c=>({...c,value:byCat[c.id]||0})).filter(c=>c.value>0).sort((a,b)=>b.value-a.value);
  const scopedTotal=sc.reduce((s,e)=>s+e.amount,0);
  const allMonths=new Set(state.expenses.map(e=>monthKey(e.date)));allMonths.add(curMonth());
  const trend=[...allMonths].sort().slice(-6).map(ym=>({ym,total:state.expenses.filter(e=>monthKey(e.date)===ym).reduce((s,e)=>s+e.amount,0)}));
  const maxM=Math.max(1,...trend.map(m=>m.total));
  const thisM=state.expenses.filter(e=>monthKey(e.date)===curMonth()).reduce((s,e)=>s+e.amount,0);
  const all=state.expenses.reduce((s,e)=>s+e.amount,0);
  const title=state.scope==='all'?'Загалом':monthLabel(state.scope);
  const list=[...sc].sort((a,b)=>(b.date+b.id).localeCompare(a.date+a.id));

  root.innerHTML=`
  <div class="topbar">
    <div class="brand"><div class="mark">₴</div><div><h1>Облік витрат</h1><p class="acct">${user?esc(user.email):''} · <a id="out" style="cursor:pointer;text-decoration:underline">вийти</a></p></div></div>
    <div class="scope"><label>Період</label><select id="scopeSel">
      ${months().map(m=>`<option value="${m}" ${m===state.scope?'selected':''}>${monthLabel(m)}</option>`).join('')}
      <option value="all" ${state.scope==='all'?'selected':''}>За весь час</option>
    </select></div>
  </div>
  <div class="grid">
    <div class="stats">
      <div class="stat"><div class="k">Цього місяця</div><div class="v">${money.format(thisM)}</div><div class="sub">${monthLabel(curMonth())}</div></div>
      <div class="stat"><div class="k">За весь час</div><div class="v">${money.format(all)}</div><div class="sub">${state.expenses.length} записів</div></div>
    </div>
    <div class="card"><h2>Додати витрату</h2>
      <div class="form-grid">
        <div class="field"><span>Сума, ₴</span><input id="amt" type="number" inputmode="decimal" placeholder="0" min="0" step="0.01"></div>
        <div class="field"><span>Категорія</span><select id="cat">${CATEGORIES.map(c=>`<option value="${c.id}">${c.icon} ${c.name}</option>`).join('')}</select></div>
        <div class="field"><span>Дата</span><input id="date" type="date" value="${todayStr()}"></div>
      </div>
      <div class="addbar"><input id="note" type="text" placeholder="Опис (необов'язково)" maxlength="80"><button class="btn" id="addBtn">Додати</button></div>
    </div>
    <div class="card"><h2>Куди йдуть гроші · ${title}</h2>
      <div class="hero">${donutSVG(segs,money.format(scopedTotal),'Всього')}
        <div class="legend">${segs.length?segs.map(c=>`<div class="legend-row"><span class="dot" style="background:${c.color}"></span><span class="name">${c.icon} ${c.name}</span><span class="amt">${money.format(c.value)}</span><span class="pct">${scopedTotal?Math.round(c.value/scopedTotal*100):0}%</span></div>`).join(''):'<div class="empty" style="padding:8px 0">Немає витрат за цей період.</div>'}</div>
      </div>
    </div>
    <div class="twocol">
      <div class="card"><h2>По місяцях</h2><div class="bars">${trend.map(m=>`<div class="bar-col"><span class="a">${m.total?money.format(m.total):''}</span><div class="bar ${m.ym===curMonth()?'':'dim'}" style="height:${Math.round(m.total/maxM*100)}%"></div><span class="m">${shortMonth(m.ym)}</span></div>`).join('')}</div></div>
      <div class="card"><h2>Записи · ${title}</h2>${list.length?list.map(e=>{const c=catById(e.category);return `<div class="tx"><span class="cat-dot" style="background:${c.color}"></span><div class="info"><div class="top"><span class="cat">${c.icon} ${c.name}</span>${e.note?`<span class="note">${esc(e.note)}</span>`:''}</div><div class="date">${new Date(e.date).toLocaleDateString('uk-UA',{day:'numeric',month:'long',year:'numeric'})}</div></div><span class="amt">${moneyExact.format(e.amount)}</span><button class="del" data-id="${e.id}" title="Видалити">✕</button></div>`;}).join(''):`<div class="empty"><strong>Ще немає записів</strong>Додай першу витрату вище.</div>`}</div>
    </div>
    <div class="footer"><span class="note">Усього записів: ${state.expenses.length} · синхронізується між пристроями</span>${state.expenses.length?`<button class="btn ghost" id="clearBtn">${state.confirmClear?'Точно очистити все?':'Очистити все'}</button>`:''}</div>
  </div>`;

  document.getElementById('scopeSel').onchange=e=>{state.scope=e.target.value;state.confirmClear=false;render();};
  document.getElementById('addBtn').onclick=addExpense;
  document.getElementById('amt').onkeydown=e=>{if(e.key==='Enter')addExpense();};
  document.getElementById('note').onkeydown=e=>{if(e.key==='Enter')addExpense();};
  document.getElementById('out').onclick=async()=>{await sb.auth.signOut();};
  document.querySelectorAll('.del').forEach(b=>b.onclick=()=>removeExpense(b.dataset.id));
  const cb=document.getElementById('clearBtn');
  if(cb)cb.onclick=()=>{if(!state.confirmClear){state.confirmClear=true;render();setTimeout(()=>{state.confirmClear=false;render();},4000);}else{state.confirmClear=false;clearAll();}};
}
</script>
</body>
</html>
